function downloadExcel() {
  const insp = window._currentInsp;
  const items = window._currentItems;
  if(!insp||!items) return;
  const storeName = insp.stores?.name||'';
  const brand = insp.stores?.brands?.name||'';
  const date = (insp.inspected_at||'').replace(/-/g,'.');
  const score = insp.score?Math.round(insp.score)+'%':'-';
  const wb = XLSX.utils.book_new();
  const ws = {};
  const merges = [];
  ws['!cols'] = [{wch:2},{wch:6},{wch:30},{wch:40},{wch:14},{wch:32},{wch:2},{wch:2}];
  ws['!rows'] = [];
  let r = 0;

  function sc(row,col,val,s){const a=XLSX.utils.encode_cell({r:row,c:col});ws[a]={v:val,t:typeof val==='number'?'n':'s',s:s||{}};}
  function mg(r1,c1,r2,c2){merges.push({s:{r:r1,c:c1},e:{r:r2,c:c2}});}
  function b(){return{top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}};}
  function cs(bg,fc,bold,wrap){return{font:{name:'맑은 고딕',sz:10,bold:!!bold,color:{rgb:fc||'111827'}},fill:{fgColor:{rgb:bg||'FFFFFF'}},alignment:{vertical:'center',wrapText:!!wrap},border:b()};}

  mg(r,0,r,7);sc(r,0,'PANASIA DINEHILL SANITATION REPORT',{font:{name:'맑은 고딕',bold:true,sz:14,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1A1F2E'}},alignment:{horizontal:'center',vertical:'center'}});
  ws['!rows'][r]={hpt:38};r++;
  [['매장명',`${brand} ${storeName}`],['점검일자',date],['점검자','본사']].forEach(([lbl,val])=>{
    ws['!rows'][r]={hpt:20};
    sc(r,4,`   ${lbl} :`,{font:{name:'맑은 고딕',sz:10,color:{rgb:'6B7280'}},alignment:{horizontal:'right',vertical:'center'}});
    sc(r,5,val,{font:{name:'맑은 고딕',bold:true,sz:10},alignment:{vertical:'center'}});r++;
  });
  ws['!rows'][r]={hpt:26};
  mg(r,0,r,2);sc(r,0,`점수 : ${score}`,{font:{name:'맑은 고딕',bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1E3A5F'}},alignment:{horizontal:'center',vertical:'center'}});
  mg(r,3,r,4);sc(r,3,`적합 : ${insp.pass_count||0}건`,{font:{name:'맑은 고딕',bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'166534'}},alignment:{horizontal:'center',vertical:'center'}});
  mg(r,5,r,7);sc(r,5,`미흡 : ${insp.fail_count||0}건`,{font:{name:'맑은 고딕',bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'B91C1C'}},alignment:{horizontal:'center',vertical:'center'}});
  r++;r++;

  const catColors = {
    '기본분야':{hdr:'1E3A5F',row:'DBEAFE'},
    '고객동선 및 객석':{hdr:'166534',row:'DCFCE7'},
    '주방 및 음식제조구역':{hdr:'92400E',row:'FEF3C7'},
    'Hall Service':{hdr:'4C1D95',row:'EDE9FE'},
    'Menu Quality':{hdr:'831843',row:'FCE7F3'}
  };
  let currentCat = '';
  items.forEach((item,idx)=>{
    const cat = item.checklist_items?.checklist_categories?.name_ko||item.checklist_items?.checklist_categories?.section||'';
    const title = item.checklist_items?.title||item.note||'-';
    const note = item.note&&item.note!=='-'?item.note:'';
    const isFail = ['poor','fail'].includes(item.result);
    const isPass = ['good','pass'].includes(item.result);
    const resTxt = isFail?(item.result==='poor'?'미  흡':'부적합'):isPass?(item.result==='good'?'우  수':'적  합'):'미점검';
    const resBg = isFail?'FEF2F2':isPass?'F0FDF4':'F9FAFB';
    const resFc = isFail?'B91C1C':isPass?'166534':'9CA3AF';
    const colors = catColors[cat]||{hdr:'374151',row:'F9FAFB'};
    if(cat!==currentCat){
      currentCat=cat;ws['!rows'][r]={hpt:22};mg(r,0,r,7);
      sc(r,0,`  □ ${cat}`,{font:{name:'맑은 고딕',bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:colors.hdr}},alignment:{vertical:'center'}});r++;
      ws['!rows'][r]={hpt:18};
      ['','번호','평가항목','평가기준','결과','지적사항','',''].forEach((h,ci)=>{
        sc(r,ci,h,{font:{name:'맑은 고딕',bold:true,sz:9,color:{rgb:'374151'}},fill:{fgColor:{rgb:'E5E7EB'}},alignment:{horizontal:'center',vertical:'center'},border:b()});
      });r++;
    }
    ws['!rows'][r]={hpt:30};
    sc(r,0,'',cs('FFFFFF'));
    sc(r,1,item.checklist_items?.item_number||(idx+1),cs(colors.row,'111827',true));
    sc(r,2,title,cs('FFFFFF','111827',false,true));
    sc(r,3,'',cs('FAFAFA'));
    sc(r,4,resTxt,cs(resBg,resFc,true));
    let nt=note;if(item.requires_action)nt=nt?'🚨 '+nt:'🚨 즉시조치 필요';
    sc(r,5,nt,cs(isFail?'FEF2F2':'FFFFFF',(isFail||item.requires_action)?'B91C1C':'374151',false,true));
    sc(r,6,'',cs('FFFFFF'));sc(r,7,'',cs('FFFFFF'));r++;
  });

  r++;ws['!rows'][r]={hpt:22};mg(r,0,r,7);sc(r,0,'  □ 총평',{font:{name:'맑은 고딕',bold:true,sz:11,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'374151'}},alignment:{vertical:'center'}});r++;
  ws['!rows'][r]={hpt:60};mg(r,0,r,7);sc(r,0,insp.comment||'(총평 없음)',{font:{name:'맑은 고딕',sz:10},alignment:{vertical:'top',wrapText:true},border:b()});r++;
  ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0},e:{r,c:7}});
  ws['!merges'] = merges;
  XLSX.utils.book_append_sheet(wb,'점검결과',ws);
  XLSX.writeFile(wb,`팬아시아다인힐_점검리스트_${brand}_${storeName}_${(insp.inspected_at||'').replace(/-/g,'')}.xlsx`);
  showToast('Excel 다운로드 완료','success');
}

  showToast('전체 매장 Excel 다운로드 완료','success');
}

// ══════════════════════════════════════════
// 삭제
// ══════════════════════════════════════════
let _deleteInspId = null;
function confirmDeleteInsp(inspId, storeName) {
  _deleteInspId = inspId;
  document.getElementById('deleteModalDesc').textContent = `${storeName} 점검 기록`;
  document.getElementById('deleteModal').classList.remove('hidden');
}
function closeDeleteModal() {
  document.getElementById('deleteModal').classList.add('hidden');
  _deleteInspId = null;
}
async function executeDelete() {
  if(!_deleteInspId) return;
  const btn = document.getElementById('deleteConfirmBtn');
  btn.textContent='삭제 중...'; btn.disabled=true;
  try {
    await sb.del('inspection_items',`?inspection_id=eq.${_deleteInspId}`);
    try{await sb.del('action_logs',`?inspection_item_id=in.(select id from inspection_items where inspection_id=eq.${_deleteInspId})`);}catch(e){}
    await sb.del('inspections',`?id=eq.${_deleteInspId}`);
    cache.inspections = (cache.inspections||[]).filter(i=>i.id!==_deleteInspId);
    closeDeleteModal();
    btn.textContent='삭제 확인'; btn.disabled=false;
    renderPage(currentPage);
    showToast('삭제 완료','success');
  } catch(e){
    btn.textContent='삭제 실패'; btn.disabled=false;
    showToast('삭제 실패: '+e.message,'error');
  }
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function showToast(msg, type='success') {
  const existing = document.getElementById('_toast');
  if(existing) existing.remove();
  const t = document.createElement('div');
  t.id = '_toast';
  t.className = 'toast';
  t.style.background = type==='success'?'#16a34a':'#dc2626';
  t.style.color = '#fff';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}
</script>
