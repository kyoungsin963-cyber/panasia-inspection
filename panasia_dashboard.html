<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PANASIA DINEHILL · 점검 대시보드 v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#f0f2f5; --surface:#fff; --surface2:#f7f8fa; --surface3:#eef0f3;
  --border:#e2e6ea; --border2:#d0d5dd;
  --text:#111827; --text-dim:#4b5563; --text-muted:#9ca3af;
  --accent:#1d4ed8; --accent-bg:#eff6ff;
  --good:#16a34a; --good-bg:#f0fdf4;
  --poor:#dc2626; --poor-bg:#fef2f2;
  --warn:#d97706; --warn-bg:#fffbeb;
  --blue:#2563eb; --blue-bg:#dbeafe;
  --purple:#7c3aed; --purple-bg:#ede9fe;
  --sidebar-w:240px;
  --transition: 0.18s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* ══ SIDEBAR ══ */
.sidebar{width:var(--sidebar-w);background:#1a1f2e;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:width var(--transition);}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07);}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.12em;color:#fff;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase;margin-top:1px;font-family:'DM Mono',monospace;}
.sidebar-nav{padding:12px 10px;flex:1;overflow-y:auto;scrollbar-width:none;}
.sidebar-nav::-webkit-scrollbar{display:none;}
.nav-section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.2);padding:10px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);}
.nav-item.active{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-weight:700;box-shadow:0 2px 12px rgba(37,99,235,.4);}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:rgba(239,68,68,.9);color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:20px;font-family:'DM Mono',monospace;}
.nav-new{margin-left:auto;background:rgba(124,58,237,.8);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;letter-spacing:.05em;}
.sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px;}
.db-dot{width:7px;height:7px;border-radius:50%;background:#4b5563;transition:all .4s;flex-shrink:0;}
.db-dot.live{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.6);}
.db-dot.error{background:#ef4444;box-shadow:0 0 8px rgba(239,68,68,.6);}
.db-status-text{font-size:11px;color:rgba(255,255,255,.3);font-family:'DM Mono',monospace;}

/* ══ MAIN ══ */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0;overflow-x:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-size:16px;font-weight:800;color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.date-badge{font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;background:var(--surface2);padding:4px 10px;border-radius:6px;border:1px solid var(--border);}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;border:1.5px solid var(--border2);background:var(--surface);color:var(--text-dim);}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.primary:hover{background:#1d4ed8;}
.btn.success{background:var(--good);color:#fff;border-color:var(--good);}
.btn.danger{background:var(--poor);color:#fff;border-color:var(--poor);}
.btn.warn{background:var(--warn);color:#fff;border-color:var(--warn);}
.btn.sm{padding:5px 10px;font-size:11px;}

/* ALERT BANNER */
.alert-banner{background:linear-gradient(135deg,#fef2f2,#fff5f5);border-bottom:2px solid #fecaca;padding:9px 24px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#991b1b;}
.alert-banner.hidden{display:none;}
.alert-banner-close{margin-left:auto;cursor:pointer;font-size:14px;color:#b91c1c;background:none;border:none;padding:2px 6px;border-radius:4px;}
.alert-banner-close:hover{background:rgba(185,28,28,.1);}
.alert-banner-spacer{height:40px;display:none;}
.alert-banner-spacer.visible{display:block;}

/* CONTENT */
.content{padding:20px 24px;flex:1;}
.fade-in{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;border-top:3px solid transparent;transition:box-shadow .15s,transform .15s;cursor:default;}
.kpi-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.07);transform:translateY(-1px);}
.kpi-card.blue{border-top-color:var(--blue);}
.kpi-card.green{border-top-color:var(--good);}
.kpi-card.orange{border-top-color:var(--warn);}
.kpi-card.red{border-top-color:var(--poor);}
.kpi-card.purple{border-top-color:var(--purple);}
.kpi-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.kpi-value{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;margin-bottom:3px;}
.kpi-value.blue{color:var(--blue);}
.kpi-value.green{color:var(--good);}
.kpi-value.orange{color:var(--warn);}
.kpi-value.red{color:var(--poor);}
.kpi-value.purple{color:var(--purple);}
.kpi-sub{font-size:11px;color:var(--text-muted);}
.kpi-trend{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700;margin-top:4px;}
.kpi-trend.up{color:var(--good);}
.kpi-trend.down{color:var(--poor);}

/* STATUS BAR */
.status-bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;}
.status-bar-track{flex:1;height:10px;border-radius:5px;background:var(--surface3);overflow:hidden;display:flex;}
.status-seg{height:100%;transition:width .7s ease;}
.status-seg.red{background:#ef4444;}
.status-seg.yellow{background:#f59e0b;}
.status-seg.green{background:#22c55e;}
.status-seg.gray{background:#d1d5db;}
.status-legend{display:flex;gap:10px;flex-shrink:0;}
.status-legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-dim);}
.status-legend-dot{width:7px;height:7px;border-radius:50%;}
.status-detail-btn{padding:6px 14px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:all .15s;}
.status-detail-btn:hover{background:#1d4ed8;}

/* PANEL */
.panel-row{display:grid;gap:14px;margin-bottom:14px;}
.panel-row.cols2{grid-template-columns:1fr 1fr;}
.panel-row.cols3{grid-template-columns:1fr 1fr 1fr;}
.panel-row.c7030{grid-template-columns:7fr 3fr;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.panel-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:13px;font-weight:800;color:var(--text);}
.panel-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
.panel-body{padding:14px 18px;}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{padding:9px 12px;background:var(--surface2);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);text-align:left;border-bottom:1px solid var(--border);}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr.clickable:hover td{background:var(--surface2);cursor:pointer;}
.score-pill{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;font-family:'DM Mono',monospace;min-width:50px;}
.score-pill.high{background:var(--good-bg);color:var(--good);border:1px solid rgba(22,163,74,.2);}
.score-pill.mid{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(217,119,6,.2);}
.score-pill.low{background:var(--poor-bg);color:var(--poor);border:1px solid rgba(220,38,38,.2);}
.score-pill.none{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}

/* CHANGE BADGE */
.change-badge{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:4px;}
.change-badge.up{background:#dcfce7;color:#16a34a;}
.change-badge.down{background:#fef2f2;color:#dc2626;}
.change-badge.same{background:var(--surface2);color:var(--text-muted);}

/* BRAND BARS */
.brand-bars{display:flex;flex-direction:column;gap:10px;}
.brand-bar-item{display:flex;flex-direction:column;gap:4px;}
.brand-bar-meta{display:flex;justify-content:space-between;align-items:center;}
.brand-bar-name{font-size:12px;font-weight:700;}
.brand-bar-score{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.brand-bar-track{height:7px;background:var(--surface3);border-radius:4px;overflow:hidden;}
.brand-bar-fill{height:100%;border-radius:4px;transition:width .8s ease;}
.brand-bar-fill.good{background:linear-gradient(90deg,#16a34a,#22c55e);}
.brand-bar-fill.mid{background:linear-gradient(90deg,#d97706,#f59e0b);}
.brand-bar-fill.low{background:linear-gradient(90deg,#dc2626,#ef4444);}

/* FAIL ITEMS */
.fail-list{display:flex;flex-direction:column;gap:7px;}
.fail-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 14px;cursor:pointer;transition:all .15s;}
.fail-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:var(--border2);}
.fail-item.action{border-left:3px solid var(--warn);}
.fail-item.repeat{border-left:3px solid var(--purple);}
.fail-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.fail-item-store{font-size:12px;font-weight:700;color:var(--text-dim);}
.fail-item-cat{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.fail-item-title{font-size:13px;font-weight:600;color:var(--text);}
.tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;margin-top:3px;margin-right:4px;}
.tag.action{color:var(--warn);background:var(--warn-bg);}
.tag.repeat{color:var(--purple);background:var(--purple-bg);}
.tag.good{color:var(--good);background:var(--good-bg);}

/* HEALTH CARDS */
.health-controls{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.health-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:11px;}
.health-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px;cursor:pointer;transition:all .2s;}
.health-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08);}
.health-card.good{border-top:3px solid var(--good);}
.health-card.warning{border-top:3px solid var(--warn);}
.health-card.danger{border-top:3px solid var(--poor);}
.health-card.uninspected{border-top:3px solid #9ca3af;}
.health-store-name{font-size:14px;font-weight:800;margin-bottom:1px;}
.health-brand{font-size:11px;color:var(--text-muted);margin-bottom:8px;}
.health-score{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;}
.health-score.good{color:var(--good);}
.health-score.warning{color:var(--warn);}
.health-score.danger{color:var(--poor);}
.health-score.uninspected{color:var(--text-muted);}
.health-meta{font-size:11px;color:var(--text-muted);margin-top:5px;}

/* CHART */
.chart-wrap{position:relative;height:230px;}

/* HISTORY FILTERS */
.filter-bar{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-select{padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--accent);}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;color:var(--text-muted);text-align:center;}
.empty-state-icon{font-size:32px;margin-bottom:10px;opacity:.5;}
.empty-state-text{font-size:13px;line-height:1.6;}

/* LOADING */
.loading-spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;color:var(--text-muted);}
.spinner{width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* UNINSPECTED CHIPS */
.uninspected-list{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0;}
.uninspected-chip{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--poor-bg);color:var(--poor);border:1px solid rgba(220,38,38,.2);font-weight:700;cursor:pointer;transition:all .15s;}
.uninspected-chip:hover{background:#fecaca;}

/* SCHEDULE */
.schedule-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);}
.schedule-row:last-child{border-bottom:none;}
.schedule-store{font-size:13px;font-weight:700;min-width:90px;}
.schedule-date{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim);}
.schedule-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-left:auto;white-space:nowrap;}
.schedule-status.overdue{background:var(--poor-bg);color:var(--poor);}
.schedule-status.soon{background:var(--warn-bg);color:var(--warn);}
.schedule-status.ok{background:var(--good-bg);color:var(--good);}

/* INSPECTOR */
.inspector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:11px;}
.inspector-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px;text-align:center;transition:all .15s;}
.inspector-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
.inspector-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:20px;color:#fff;font-weight:800;}
.inspector-name{font-size:14px;font-weight:800;margin-bottom:3px;}
.inspector-cnt{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--accent);line-height:1;}
.inspector-sub{font-size:11px;color:var(--text-muted);}

/* REPORT */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .15s;}
.report-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(37,99,235,.1);}
.report-card-icon{font-size:26px;margin-bottom:8px;}
.report-card-title{font-size:14px;font-weight:800;margin-bottom:3px;}
.report-card-desc{font-size:12px;color:var(--text-dim);line-height:1.5;}

/* ══ MODAL ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--surface);border-radius:16px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.22);}
.modal-header{padding:18px 22px;background:#1a1f2e;display:flex;align-items:flex-start;justify-content:space-between;}
.modal-store-name{font-size:19px;font-weight:800;color:#fff;margin-bottom:4px;}
.modal-meta{display:flex;gap:7px;flex-wrap:wrap;}
.modal-meta-tag{font-size:11px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.08);padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;}
.modal-close{background:rgba(255,255,255,.1);border:none;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal-close:hover{background:rgba(255,255,255,.2);}
.modal-kpi{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border);}
.modal-kpi-item{padding:12px 16px;text-align:center;border-right:1px solid var(--border);}
.modal-kpi-item:last-child{border-right:none;}
.modal-kpi-label{font-size:10px;color:var(--text-muted);margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.modal-kpi-value{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
.modal-compare{padding:9px 22px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:center;font-size:12px;flex-wrap:wrap;}
.modal-compare.hidden{display:none;}
.compare-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-weight:700;}
.compare-tag.up{background:#dcfce7;color:#16a34a;}
.compare-tag.down{background:#fef2f2;color:#dc2626;}
.compare-tag.same{background:var(--surface3);color:var(--text-muted);}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1;}
.modal-section-title{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.modal-item-list{display:flex;flex-direction:column;gap:5px;margin-bottom:18px;}
.modal-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);}
.modal-item.fail{background:var(--poor-bg);border-color:rgba(220,38,38,.2);}
.modal-item.warn{background:var(--warn-bg);border-color:rgba(217,119,6,.2);}
.modal-item.pass{background:var(--surface2);}
.modal-item-num{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;background:var(--surface3);padding:2px 5px;border-radius:4px;color:var(--text-muted);flex-shrink:0;margin-top:1px;}
.modal-item-content{flex:1;}
.modal-item-cat{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);margin-bottom:2px;}
.modal-item-title{font-size:13px;font-weight:600;color:var(--text);}
.modal-item-note{font-size:12px;color:var(--text-dim);margin-top:2px;}
.modal-item-badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;flex-shrink:0;align-self:flex-start;}
.modal-item-badge.fail{background:var(--poor-bg);color:var(--poor);border:1px solid rgba(220,38,38,.3);}
.modal-item-badge.warn{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(217,119,6,.3);}
.modal-item-badge.pass{background:var(--good-bg);color:var(--good);border:1px solid rgba(22,163,74,.2);}
.modal-comment{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:13px;font-size:13px;color:var(--text-dim);line-height:1.7;}
.modal-toolbar{padding:12px 22px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.toggle-expand-btn{width:100%;padding:7px;border:1px dashed var(--border2);border-radius:7px;background:none;color:var(--text-muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:3px;transition:all .15s;}
.toggle-expand-btn:hover{background:var(--surface2);}

/* ACTION PANEL */
.action-panel{padding:14px 22px;border-top:2px solid var(--warn-bg);background:var(--warn-bg);flex-shrink:0;}
.action-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.action-panel-title{font-size:13px;font-weight:800;color:var(--warn);}
.action-log-item{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 12px;margin-bottom:5px;}
.action-log-meta{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:2px;}
.action-log-text{font-size:13px;color:var(--text);}
.action-form{display:flex;flex-direction:column;gap:7px;}
.action-textarea{padding:9px 12px;border:1.5px solid var(--border2);border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--text);resize:vertical;min-height:70px;outline:none;}
.action-textarea:focus{border-color:var(--warn);}

/* DELETE MODAL */
.delete-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;}
.delete-modal-overlay.hidden{display:none;}
.delete-modal-box{background:var(--surface);border-radius:14px;padding:26px;max-width:380px;width:100%;margin:20px;box-shadow:0 16px 40px rgba(0,0,0,.15);}

/* SEARCH BAR */
.search-wrap{position:relative;flex:1;max-width:240px;}
.search-input{width:100%;padding:7px 10px 7px 32px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--surface);outline:none;}
.search-input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:999;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:slideUp .3s ease;pointer-events:none;}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* SPARKLINE */
.sparkline-wrap{margin-top:7px;}

/* PROGRESS RING */
.progress-ring{position:relative;width:60px;height:60px;}
.progress-ring svg{transform:rotate(-90deg);}
.progress-ring .track{fill:none;stroke:var(--surface3);stroke-width:5;}
.progress-ring .fill{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .8s ease;}
.progress-ring .label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;}

/* TABS */
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px;}
.tab-item{padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab-item:hover{color:var(--text);}
.tab-item.active{color:var(--accent);border-bottom-color:var(--accent);}

/* responsive */

<script>
// ══════════════════════════════════════════
// CONFIG — Supabase 키는 원본 유지
// ══════════════════════════════════════════
const SB_URL = 'https://qrhhmirgcbvxygcyyhzd.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyaGhtaXJnY2J2eHlnY3l5aHpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNTcxNDksImV4cCI6MjA4NzgzMzE0OX0.x71XCSt_e0wKBj7Lltvr-tYUB-LF4xLYL1A-12RzYPs';
const H = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`};

const sb = {
  async get(t,q=''){const r=await fetch(`${SB_URL}/rest/v1/${t}${q}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json();},
  async post(t,body){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());return r.json();},
  async patch(t,q,body){const r=await fetch(`${SB_URL}/rest/v1/${t}${q}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());return r.json();},
  async del(t,q){const r=await fetch(`${SB_URL}/rest/v1/${t}${q}`,{method:'DELETE',headers:{...H,'Prefer':'return=minimal'}});if(!r.ok)throw new Error(await r.text());return true;}
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let currentPage = 'overview';
let cache = {};
let chartInstances = {};
let healthFilter = 'all';
let healthSort = 'score';

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  document.getElementById('todayBadge').textContent =
    now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  loadAll();
});

async function loadAll() {
  showLoading();
  try {
    const [inspections, stores, brands, failItems] = await Promise.all([
      sb.get('inspections','?select=*,stores(id,name,region,brand_id,brands(id,name))&order=inspected_at.desc&limit=500'),
      sb.get('stores','?select=*,brands(id,name)&order=name'),
      sb.get('brands','?select=*&order=name'),
      sb.get('inspection_items','?select=*,inspections(id,store_id,inspected_at,stores(id,name,brands(name)))&result=in.(poor,fail)&order=created_at.desc&limit=300'),
    ]);
    cache = { inspections, stores, brands, failItems };

    document.getElementById('dbDot').className = 'db-dot live';
    document.getElementById('dbText').textContent = 'DB 연결됨';

    // 미점검 배너
    const uninsp = getUninspectedStores();
    const banner = document.getElementById('alertBanner');
    if (uninsp.length > 0) {
      document.getElementById('alertBannerText').textContent =
        `미점검 매장 ${uninsp.length}개: ${uninsp.slice(0,5).map(s=>s.name).join(', ')}${uninsp.length>5?` 외 ${uninsp.length-5}개`:''}`;
      banner.classList.remove('hidden');
    } else {
      banner.classList.add('hidden');
    }

    // 즉시조치 배지
    const actionItems = failItems.filter(i=>i.requires_action);
    const badge = document.getElementById('failBadge');
    if (actionItems.length > 0) {
      badge.textContent = actionItems.length;
      badge.style.display = 'inline-flex';
    } else {
      badge.style.display = 'none';
    }

    renderPage(currentPage);
  } catch(e) {
    document.getElementById('dbDot').className = 'db-dot error';
    document.getElementById('dbText').textContent = 'DB 오류';
    showError(e.message);
  }
}

function showLoading() {
  document.getElementById('pageContent').innerHTML =
    '<div class="loading-spinner"><div class="spinner"></div><div>데이터 불러오는 중...</div></div>';
}

function showError(msg) {
  document.getElementById('pageContent').innerHTML =
    `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">데이터를 불러오지 못했습니다.<br><small style="font-family:'DM Mono',monospace">${msg}</small></div></div>`;
}

// ══════════════════════════════════════════
// ROUTER
// ══════════════════════════════════════════
const PAGE_TITLES = {
  overview:'종합 현황', stores:'매장별 점수', fails:'미흡 항목', trend:'트렌드 분석',
  health:'매장 건강도', repeat:'반복 미흡 추적', compare:'매장 비교',
  report:'월간 리포트', history:'점검 이력', inspector:'점검자 통계', schedule:'점검 스케줄'
};

function setPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(`'${page}'`));
  });
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
  Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}});
  chartInstances = {};
  renderPage(page);
}

function renderPage(page) {
  const el = document.getElementById('pageContent');
  const pages = {
    overview:renderOverview, stores:renderStores, fails:renderFails,
    trend:renderTrend, health:renderHealth, repeat:renderRepeat, compare:renderCompare,
    report:renderReport, history:renderHistory, inspector:renderInspector, schedule:renderSchedule
  };
  if (pages[page]) pages[page](el);
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function getLatestInspByStore() {
  const map = {};
  (cache.inspections||[]).forEach(i=>{
    if(!map[i.store_id]||i.inspected_at>map[i.store_id].inspected_at) map[i.store_id]=i;
  });
  return map;
}

function getAllInspByStore() {
  const map = {};
  (cache.inspections||[]).forEach(i=>{
    if(!map[i.store_id]) map[i.store_id]=[];
    map[i.store_id].push(i);
  });
  return map;
}

function getPrevInspByStore() {
  const map = getAllInspByStore();
  const prev = {};
  Object.keys(map).forEach(sid=>{
    const sorted = map[sid].sort((a,b)=>b.inspected_at.localeCompare(a.inspected_at));
    if(sorted.length>1) prev[sid]=sorted[1];
  });
  return prev;
}

function getUninspectedStores() {
  const latestMap = getLatestInspByStore();
  return (cache.stores||[]).filter(s=>!latestMap[s.id]);
}

function scorePillClass(score) {
  if(!score&&score!==0) return 'none';
  if(score>=80) return 'high';
  if(score>=60) return 'mid';
  return 'low';
}

function calcHealth(store, allInsp) {
  const storeInsps = (allInsp||[]).filter(i=>i.store_id===store.id)
    .sort((a,b)=>b.inspected_at.localeCompare(a.inspected_at));
  const latest = storeInsps[0];
  if(!latest) return {health:0,status:'uninspected',inspCount:0,latest:null,storeInsps};
  let health = Math.round(latest.score||0);
  const daysSince = Math.floor((new Date()-new Date(latest.inspected_at))/86400000);
  if((latest.fail_count||0)>=10) health = Math.max(0,health-5);
  const scores = storeInsps.map(i=>i.score||0).filter(s=>s>0).slice(0,6).reverse();
  if(scores.length>=3){
    const h=scores.slice(Math.ceil(scores.length/2));
    const l=scores.slice(0,Math.ceil(scores.length/2));
    const ha=h.reduce((a,b)=>a+b,0)/h.length;
    const la=l.reduce((a,b)=>a+b,0)/l.length||1;
    if((ha-la)/la*100<=-15) health=Math.max(0,health-8);
  }
  if(daysSince>60) health=Math.max(0,health-15);
  else if(daysSince>30) health=Math.max(0,health-5);
  health = Math.max(0,Math.min(100,health));
  const status = health>=80?'good':health>=60?'warning':'danger';
  return {health,status,inspCount:storeInsps.length,latest,storeInsps,daysSince};
}

function renderBrandBars() {
  const insp = cache.inspections||[];
  const brandScores = {};
  insp.forEach(i=>{
    const bn = i.stores?.brands?.name;
    if(!bn||!i.score) return;
    if(!brandScores[bn]) brandScores[bn]=[];
    brandScores[bn].push(i.score);
  });
  const brands = Object.keys(brandScores);
  if(!brands.length) return '<div class="empty-state" style="padding:20px"><div class="empty-state-icon">📊</div><div class="empty-state-text">점수 데이터가 없습니다</div></div>';
  return `<div class="brand-bars">${brands.map(bn=>{
    const avg = Math.round(brandScores[bn].reduce((a,b)=>a+b,0)/brandScores[bn].length);
    const cls = avg>=80?'good':avg>=60?'mid':'low';
    return `<div class="brand-bar-item">
      <div class="brand-bar-meta"><span class="brand-bar-name">${bn}</span><span class="brand-bar-score">${avg}% · ${brandScores[bn].length}회</span></div>
      <div class="brand-bar-track"><div class="brand-bar-fill ${cls}" style="width:${avg}%"></div></div>
    </div>`;
  }).join('')}</div>`;
}

// ══════════════════════════════════════════
// PAGE: OVERVIEW
// ══════════════════════════════════════════
function renderOverview(el) {
  const insp = cache.inspections||[];
  const stores = cache.stores||[];
  const latestMap = getLatestInspByStore();
  const uninspected = getUninspectedStores();
  const actionItems = (cache.failItems||[]).filter(i=>i.requires_action);

  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const prevMonth = now.getMonth()===0
    ? `${now.getFullYear()-1}-12`
    : `${now.getFullYear()}-${String(now.getMonth()).padStart(2,'0')}`;
  const monthInsp = insp.filter(i=>(i.inspected_at||'').startsWith(thisMonth));
  const prevMonthInsp = insp.filter(i=>(i.inspected_at||'').startsWith(prevMonth));
  const monthAvg = monthInsp.length ? Math.round(monthInsp.reduce((a,b)=>a+(b.score||0),0)/monthInsp.length) : 0;
  const prevMonthAvg = prevMonthInsp.length ? Math.round(prevMonthInsp.reduce((a,b)=>a+(b.score||0),0)/prevMonthInsp.length) : 0;

  const allLatest = Object.values(latestMap);
  const overallAvg = allLatest.length ? Math.round(allLatest.reduce((a,b)=>a+(b.score||0),0)/allLatest.length) : 0;

  const healthData = stores.map(s=>calcHealth(s,insp));
  const goodCnt = healthData.filter(h=>h.status==='good').length;
  const warnCnt = healthData.filter(h=>h.status==='warning').length;
  const dangerCnt = healthData.filter(h=>h.status==='danger').length;
  const uninspCnt = healthData.filter(h=>h.status==='uninspected').length;
  const total = stores.length||1;

  const monthDiff = monthAvg - prevMonthAvg;
  const trendHtml = prevMonthAvg
    ? `<div class="kpi-trend ${monthDiff>=0?'up':'down'}">${monthDiff>=0?'▲':'▼'} ${Math.abs(monthDiff)}% vs 전월</div>`
    : '';

  el.innerHTML = `<div class="fade-in">
    <div class="kpi-grid">
      <div class="kpi-card blue">
        <div class="kpi-label">전체 매장</div>
        <div class="kpi-value blue">${stores.length}</div>
        <div class="kpi-sub">${allLatest.length}개 점검 완료</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">전체 평균</div>
        <div class="kpi-value green">${overallAvg}%</div>
        <div class="kpi-sub">${allLatest.length}회 기반</div>
      </div>

// PAGE: STORES — 1차: 직전 대비 변화 표시
// ══════════════════════════════════════════
function renderStores(el) {
  const stores = cache.stores||[];
  const insp = cache.inspections||[];
  const latestMap = getLatestInspByStore();
  const prevMap = getPrevInspByStore();
  let searchVal = '';

  function getRows(query) {
    return stores
      .filter(s=>!query || s.name.includes(query) || (s.brands?.name||'').includes(query))
      .map(s=>{
        const latest = latestMap[s.id];
        const prev = prevMap[s.id];
        const score = latest?.score;
        const prevScore = prev?.score;
        let changeTxt='', changeClass='same';
        if(score&&prevScore){
          const diff=Math.round(score-prevScore);
          if(diff>0){changeTxt=`+${diff}%`;changeClass='up';}
          else if(diff<0){changeTxt=`${diff}%`;changeClass='down';}
          else changeTxt='±0%';
        }
        return {s,latest,score,changeTxt,changeClass};
      }).sort((a,b)=>(b.score||-1)-(a.score||-1));
  }

  function tableHtml(rows) {
    return `<table class="data-table">
      <thead><tr><th>매장명</th><th>브랜드</th><th>지역</th><th>점검일</th><th>점수</th><th>직전 대비</th><th>적합</th><th>미흡</th></tr></thead>
      <tbody>${rows.map(({s,latest,score,changeTxt,changeClass})=>`
        <tr class="clickable" onclick="openDetailByStore('${s.id}')">
          <td style="font-weight:700">${s.name}</td>
          <td style="color:var(--text-dim)">${s.brands?.name||'-'}</td>
          <td style="color:var(--text-dim);font-size:12px">${s.region||'-'}</td>
          <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim)">${latest?.inspected_at||'미점검'}</td>
          <td><span class="score-pill ${scorePillClass(score)}">${score?Math.round(score)+'%':'미점검'}</span></td>
          <td>${changeTxt?`<span class="change-badge ${changeClass}">${changeTxt}</span>`:'-'}</td>
          <td style="color:var(--good);font-family:'DM Mono',monospace;font-size:12px">${latest?.pass_count??'-'}</td>
          <td style="color:var(--poor);font-family:'DM Mono',monospace;font-size:12px">${latest?.fail_count??'-'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  el.innerHTML = `<div class="fade-in">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">전체 매장 점수 현황</div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" id="storeSearch" placeholder="매장명 검색..." oninput="filterStores()">
          </div>
          <button class="btn" onclick="exportAllStoresExcel()">📊 Excel</button>
        </div>
      </div>
      <div class="panel-body" style="padding:0" id="storeTableWrap">${tableHtml(getRows(''))}</div>
    </div>
  </div>`;

  window._getStoreRows = getRows;
  window._storeTableHtml = tableHtml;
}

function filterStores() {
  const q = document.getElementById('storeSearch')?.value||'';
  const rows = window._getStoreRows(q);
  document.getElementById('storeTableWrap').innerHTML = window._storeTableHtml(rows);
}

// PAGE: FAILS — 2차: 반복 미흡 표시
// ══════════════════════════════════════════
function renderFails(el) {
  const items = cache.failItems||[];
  const brands = [...new Set(items.map(i=>i.inspections?.stores?.brands?.name).filter(Boolean))];
  const repeatMap = buildRepeatMap(items);

  el.innerHTML = `<div class="fade-in">
    <div class="filter-bar">
      <select class="filter-select" id="failBrandFilter" onchange="filterFails()">
        <option value="">전체 브랜드</option>
        ${brands.map(b=>`<option value="${b}">${b}</option>`).join('')}
      </select>
      <select class="filter-select" id="failTypeFilter" onchange="filterFails()">
        <option value="">전체</option>
        <option value="action">즉시조치만</option>
        <option value="repeat">반복 미흡만</option>
      </select>
      <div style="margin-left:auto;font-size:12px;color:var(--text-muted)">${items.length}건</div>
    </div>
    <div id="failListBody">${renderFailItems(items, repeatMap)}</div>
  </div>`;
}

function buildRepeatMap(items) {
  const map = {};
  items.forEach(i=>{
    const key = `${i.inspections?.store_id}__${i.note?.trim()||''}`;
    if(i.note?.trim()) map[key] = (map[key]||0)+1;
  });
  return map;
}

function filterFails() {
  let items = cache.failItems||[];
  const brand = document.getElementById('failBrandFilter')?.value;
  const type = document.getElementById('failTypeFilter')?.value;
  const repeatMap = buildRepeatMap(items);
  if(brand) items = items.filter(i=>i.inspections?.stores?.brands?.name===brand);
  if(type==='action') items = items.filter(i=>i.requires_action);
  if(type==='repeat') items = items.filter(i=>{
    const key=`${i.inspections?.store_id}__${i.note?.trim()||''}`;
    return (repeatMap[key]||0)>=2;
  });
  document.getElementById('failListBody').innerHTML = renderFailItems(items, repeatMap);
}

function renderFailItems(items, repeatMap={}) {
  if(!items.length) return '<div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-text">미흡 항목이 없습니다</div></div>';
  return `<div class="fail-list">${items.slice(0,60).map(i=>{
    const key = `${i.inspections?.store_id}__${i.note?.trim()||''}`;
    const repeatCnt = repeatMap[key]||0;
    const isRepeat = repeatCnt>=2;
    return `<div class="fail-item${i.requires_action?' action':''}${isRepeat?' repeat':''}" onclick="openDetail('${i.inspections?.id||''}')">
      <div class="fail-item-top">
        <span class="fail-item-store">${i.inspections?.stores?.name||'-'} · ${i.inspections?.stores?.brands?.name||'-'}</span>
        <span class="fail-item-cat">${i.inspections?.inspected_at||''}</span>
      </div>
      <div class="fail-item-title">${i.note||'(메모 없음)'}</div>
      <div>
        ${i.requires_action?'<span class="tag action">🚨 즉시조치</span>':''}
        ${isRepeat?`<span class="tag repeat">🔁 ${repeatCnt}회 반복</span>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

// PAGE: TREND
// ══════════════════════════════════════════
function renderTrend(el) {
  el.innerHTML = `<div class="fade-in">
    <div class="panel-row cols2">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">월별 평균 점수 추이</div></div>
        <div class="panel-body"><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div>
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">브랜드별 점수 비교</div></div>
        <div class="panel-body"><div class="chart-wrap"><canvas id="brandChart"></canvas></div></div>
      </div>
    </div>
    <div class="panel-row cols2">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">점수 분포 (히스토그램)</div></div>
        <div class="panel-body"><div class="chart-wrap"><canvas id="histChart"></canvas></div></div>
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">월별 점검 빈도</div></div>
        <div class="panel-body" id="heatmapBody"></div>
      </div>
    </div>
  </div>`;
  setTimeout(drawCharts, 50);
}

function drawCharts() {
  const insp = cache.inspections||[];

  // 월별 평균
  const monthly = {};
  insp.forEach(i=>{
    const m=(i.inspected_at||'').slice(0,7);
    if(!m) return;
    if(!monthly[m]) monthly[m]=[];
    monthly[m].push(i.score||0);
  });
  const months = Object.keys(monthly).sort().slice(-12);
  const monthAvgs = months.map(m=>Math.round(monthly[m].reduce((a,b)=>a+b,0)/monthly[m].length));

  const tc = document.getElementById('trendChart');
  if(tc) chartInstances.trend = new Chart(tc, {
    type:'line',
    data:{
      labels: months.map(m=>m.replace('-','년 ')+'월'),
      datasets:[{
        label:'월평균',data:monthAvgs,
        borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.08)',
        tension:.4,fill:true,pointRadius:5,pointBackgroundColor:'#2563eb',
        pointHoverRadius:7
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y}%`}}},
      scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}
  });

  // 브랜드별
  const brandMap = {};
  insp.forEach(i=>{
    const bn=i.stores?.brands?.name;
    if(!bn||!i.score) return;
    if(!brandMap[bn]) brandMap[bn]=[];
    brandMap[bn].push(i.score);
  });
  const bNames = Object.keys(brandMap);
  const bAvgs = bNames.map(b=>Math.round(brandMap[b].reduce((a,c)=>a+c,0)/brandMap[b].length));
  const colors = ['#2563eb','#16a34a','#d97706','#7c3aed','#dc2626','#0891b2'];

  const bc = document.getElementById('brandChart');
  if(bc) chartInstances.brand = new Chart(bc, {
    type:'bar',
    data:{
      labels:bNames,
      datasets:[{label:'평균 점수',data:bAvgs,
        backgroundColor:bNames.map((_,i)=>colors[i%colors.length]+'bb'),
        borderColor:bNames.map((_,i)=>colors[i%colors.length]),
        borderWidth:2,borderRadius:6}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y}%`}}},
      scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}
  });

  // 점수 분포
  const scores = insp.map(i=>i.score||0).filter(s=>s>0);
  const bins = [0,0,0,0,0]; // <60, 60-70, 70-80, 80-90, 90-100
  scores.forEach(s=>{
    if(s<60) bins[0]++;
    else if(s<70) bins[1]++;
    else if(s<80) bins[2]++;
    else if(s<90) bins[3]++;
    else bins[4]++;
  });
  const hc = document.getElementById('histChart');
  if(hc) chartInstances.hist = new Chart(hc, {
    type:'bar',
    data:{
      labels:['60미만','60~70','70~80','80~90','90이상'],
      datasets:[{label:'점검 수',data:bins,
        backgroundColor:['#fca5a5','#fcd34d','#fdba74','#86efac','#4ade80'],
        borderRadius:6}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{y:{ticks:{stepSize:1}}}}
  });

  // 히트맵
  const hb = document.getElementById('heatmapBody');
  if(hb) {
    const monthCnt = {};
    insp.forEach(i=>{const m=(i.inspected_at||'').slice(0,7);if(m) monthCnt[m]=(monthCnt[m]||0)+1;});
    const allMonths = Object.keys(monthCnt).sort().slice(-12);
    const maxCnt = Math.max(...Object.values(monthCnt),1);
    hb.innerHTML = `<div style="display:flex;gap:7px;flex-wrap:wrap">
      ${allMonths.map(m=>{
        const cnt = monthCnt[m]||0;
        const intensity = cnt/maxCnt;
        const bg = `rgba(37,99,235,${0.08+intensity*0.85})`;
        const fc = intensity>0.5?'#fff':'var(--text)';
        return `<div style="background:${bg};color:${fc};padding:9px 14px;border-radius:8px;text-align:center;min-width:76px">
          <div style="font-family:'DM Mono',monospace;font-size:10px;margin-bottom:3px">${m}</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px">${cnt}</div>
          <div style="font-size:10px;opacity:.7">회</div>
        </div>`;
      }).join('')}
    </div>`;
  }
}

// ══════════════════════════════════════════
// PAGE: HEALTH
// ══════════════════════════════════════════
function renderHealth(el) {
  const stores = cache.stores||[];
  const allInsp = cache.inspections||[];
  let data = stores.map(s=>({store:s,...calcHealth(s,allInsp)}));

  if(healthFilter!=='all') data = data.filter(d=>d.status===healthFilter);
  if(healthSort==='score') data.sort((a,b)=>b.health-a.health);
  else if(healthSort==='name') data.sort((a,b)=>a.store.name.localeCompare(b.store.name,'ko'));
  else if(healthSort==='date') data.sort((a,b)=>(b.latest?.inspected_at||'').localeCompare(a.latest?.inspected_at||''));

  el.innerHTML = `<div class="fade-in">
    <div class="health-controls">
      ${['all','good','warning','danger','uninspected'].map(f=>`
        <button class="filter-btn ${healthFilter===f?'active':''}" onclick="setHealthFilter('${f}')">
          ${{all:'전체',good:'✅ 양호',warning:'⚠️ 주의',danger:'🔴 위험',uninspected:'⬜ 미점검'}[f]}
        </button>`).join('')}
      <div style="margin-left:auto;display:flex;gap:5px">
        ${['score','name','date'].map(s=>`
          <button class="filter-btn ${healthSort===s?'active':''}" onclick="setHealthSort('${s}')">
            ${{score:'점수순',name:'가나다',date:'점검일'}[s]}
          </button>`).join('')}
      </div>
    </div>
    <div class="health-grid">
      ${data.map((d,idx)=>renderHealthCard(d,idx)).join('')}
    </div>
  </div>`;

  data.forEach((d,idx)=>{
    const scores = d.storeInsps.map(i=>i.score||0).filter(s=>s>0).slice(0,6).reverse();
    if(scores.length>1) drawSparkline(`spark-${idx}`, scores, d.status);
  });
}

function renderHealthCard(d, idx) {
  const {store,health,status,inspCount,latest,daysSince} = d;
  return `<div class="health-card ${status==='uninspected'?'uninspected':status}" onclick="openDetailByStore('${store.id}')">
    <div class="health-store-name">${store.name}</div>
    <div class="health-brand">${store.brands?.name||'-'}</div>
    <div class="health-score ${status==='uninspected'?'uninspected':status}">${status==='uninspected'?'-':health}</div>
    <div class="health-meta">
      ${status==='uninspected'?'미점검':`${inspCount}회 · ${daysSince!=null?daysSince+'일 전':'-'}`}
    </div>
    <div class="sparkline-wrap"><canvas id="spark-${idx}" height="34"></canvas></div>
  </div>`;
}

function drawSparkline(id, scores, status) {
  const c = document.getElementById(id);
  if(!c) return;
  const color = status==='good'?'#16a34a':status==='warning'?'#d97706':'#dc2626';
  chartInstances[id] = new Chart(c, {
    type:'line',
    data:{labels:scores.map((_,i)=>i),
      datasets:[{data:scores,borderColor:color,borderWidth:1.5,pointRadius:0,tension:.4,fill:false}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{x:{display:false},y:{display:false,min:0,max:100}}}
  });
}

function setHealthFilter(f) {
  healthFilter = f;
  renderHealth(document.getElementById('pageContent'));
}

function setHealthSort(s) {
  healthSort = s;
  renderHealth(document.getElementById('pageContent'));
}

function renderRepeat(el) {
  const items = cache.failItems||[];
  const repeatMap = {};
  items.forEach(i=>{
    const storeId = i.inspections?.store_id;
    const storeName = i.inspections?.stores?.name||'-';
    const brand = i.inspections?.stores?.brands?.name||'-';
    const note = i.note?.trim();
    if(!note||!storeId) return;
    const key = `${storeId}||${note}`;
    if(!repeatMap[key]) repeatMap[key]={storeId,storeName,brand,note,cnt:0,dates:[]};
    repeatMap[key].cnt++;
    repeatMap[key].dates.push(i.inspections?.inspected_at||'');
  });
  const repeats = Object.values(repeatMap).filter(r=>r.cnt>=2).sort((a,b)=>b.cnt-a.cnt);

  el.innerHTML = `<div class="fade-in">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:12px 16px;background:var(--purple-bg);border:1px solid rgba(124,58,237,.2);border-radius:10px">
      <span style="font-size:18px">🔁</span>
      <div style="font-size:13px;color:#5b21b6">동일 매장에서 <strong>2회 이상 반복</strong>된 미흡 항목입니다. 근본 원인 파악 및 개선이 필요합니다.</div>
      <div class="panel-badge" style="margin-left:auto">${repeats.length}건</div>
    </div>
    ${repeats.length===0
      ? '<div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-text">반복 미흡 항목이 없습니다</div></div>'
      : `<div class="fail-list">${repeats.map(r=>`
        <div class="fail-item repeat">
          <div class="fail-item-top">
            <span class="fail-item-store">${r.storeName} · ${r.brand}</span>
            <span class="tag repeat">🔁 ${r.cnt}회 반복</span>
          </div>
          <div class="fail-item-title">${r.note}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px">📅 ${r.dates.filter(Boolean).sort().join(' / ')}</div>
        </div>`).join('')}
      </div>`
    }
  </div>`;
}

function renderCompare(el) {

  const insp = cache.inspections||[];
  const latestMap = getLatestInspByStore();

  el.innerHTML = `<div class="fade-in">
    <div class="panel" style="margin-bottom:14px">
      <div class="panel-header"><div class="panel-title">매장 비교 선택 (최대 4개)</div></div>
      <div class="panel-body">
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
          ${stores.filter(s=>latestMap[s.id]).map(s=>`
            <label style="display:flex;align-items:center;gap:5px;cursor:pointer;padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;transition:all .15s;user-select:none" id="cmp-lbl-${s.id}">
              <input type="checkbox" id="cmp-${s.id}" value="${s.id}" onchange="updateCompare()" style="cursor:pointer">
              <span>${s.name}</span>
              <span class="score-pill ${scorePillClass(latestMap[s.id]?.score)}" style="font-size:10px;padding:1px 6px">${latestMap[s.id]?.score?Math.round(latestMap[s.id].score)+'%':'?'}</span>
            </label>`).join('')}
        </div>
      </div>
    </div>
    <div id="compareResult"></div>
  </div>`;
}

function updateCompare() {
  const checked = [...document.querySelectorAll('[id^="cmp-"]:checked')].map(el=>el.value);
  const el = document.getElementById('compareResult');
  if(checked.length<2) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><div class="empty-state-text">비교할 매장을 2개 이상 선택하세요</div></div>';
    return;
  }
  const stores = cache.stores||[];
  const insp = cache.inspections||[];
  const selected = stores.filter(s=>checked.includes(s.id));
  const allByStore = getAllInspByStore();

  // Radar-like comparison
  const colors = ['#2563eb','#16a34a','#d97706','#7c3aed'];
  el.innerHTML = `<div class="panel-row cols2">
    <div class="panel">
      <div class="panel-header"><div class="panel-title">점수 추이 비교</div></div>
      <div class="panel-body"><div class="chart-wrap"><canvas id="cmpChart"></canvas></div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title">항목 비교</div></div>
      <div class="panel-body" style="padding:0">
        <table class="data-table">
          <thead><tr><th>매장</th><th>최근점수</th><th>평균</th><th>최고</th><th>최저</th><th>횟수</th></tr></thead>
          <tbody>${selected.map((s,si)=>{
            const insps = (allByStore[s.id]||[]).sort((a,b)=>b.inspected_at.localeCompare(a.inspected_at));
            const scores = insps.map(i=>i.score||0).filter(s=>s>0);
            const latest = scores[0];
            const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
            const max = scores.length ? Math.max(...scores) : 0;
            const min = scores.length ? Math.min(...scores) : 0;
            return `<tr>
              <td style="font-weight:700;color:${colors[si%colors.length]}">${s.name}</td>
              <td><span class="score-pill ${scorePillClass(latest)}">${latest?Math.round(latest)+'%':'-'}</span></td>
              <td style="font-family:'DM Mono',monospace;font-size:12px">${avg}%</td>
              <td style="color:var(--good);font-family:'DM Mono',monospace;font-size:12px">${max?Math.round(max)+'%':'-'}</td>
              <td style="color:var(--poor);font-family:'DM Mono',monospace;font-size:12px">${min?Math.round(min)+'%':'-'}</td>
              <td style="font-family:'DM Mono',monospace;font-size:12px">${scores.length}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;

  setTimeout(()=>{
    const ctx = document.getElementById('cmpChart');
    if(!ctx) return;
    const datasets = selected.map((s,si)=>{
      const insps = (allByStore[s.id]||[]).sort((a,b)=>a.inspected_at.localeCompare(b.inspected_at)).slice(-8);
      return {
        label:s.name, data:insps.map(i=>i.score?Math.round(i.score):null),
        borderColor:colors[si%colors.length], backgroundColor:'transparent',
        tension:.4, pointRadius:4, pointBackgroundColor:colors[si%colors.length]
      };
    });
    const labels = [...new Set(selected.flatMap(s=>(allByStore[s.id]||[]).map(i=>i.inspected_at||'')))].sort().slice(-8);
    chartInstances.cmp = new Chart(ctx, {
      type:'line',
      data:{labels, datasets},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'top'}},
        scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}
    });
  },50);
}

// PAGE: REPORT — 3차 월간 리포트

function renderReport(el) {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const prevMonth = now.getMonth()===0
    ? `${now.getFullYear()-1}-12`
    : `${now.getFullYear()}-${String(now.getMonth()).padStart(2,'0')}`;

  el.innerHTML = `<div class="fade-in">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:13px;font-weight:700">기준 월:</span>
        <select class="filter-select" id="reportMonth" onchange="updateReport()">
          <option value="${thisMonth}">${thisMonth} (이번달)</option>
          <option value="${prevMonth}">${prevMonth} (지난달)</option>

      </div>
      <button class="btn primary" onclick="downloadMonthlyReport()">📊 Excel 다운로드</button>
    </div>
    <div id="reportContent"></div>

function updateReport() {
  const month = document.getElementById('reportMonth')?.value;
  if(!month) return;
  const insp = (cache.inspections||[]).filter(i=>(i.inspected_at||'').startsWith(month));
  const stores = cache.stores||[];
  const inspectedIds = [...new Set(insp.map(i=>i.store_id))];
  const avg = insp.length ? Math.round(insp.reduce((a,b)=>a+(b.score||0),0)/insp.length) : 0;
  const avgFail = insp.length ? Math.round(insp.reduce((a,b)=>a+(b.fail_count||0),0)/insp.length*10)/10 : 0;
  const topStore = insp.length ? insp.reduce((a,b)=>(a.score||0)>(b.score||0)?a:b) : null;
  const botStore = insp.length ? insp.reduce((a,b)=>(a.score||0)<(b.score||0)?a:b) : null;

  const brandMap = {};
  insp.forEach(i=>{
    const bn = i.stores?.brands?.name||'기타';
    if(!brandMap[bn]) brandMap[bn]=[];
    brandMap[bn].push(i.score||0);
  });

  const el = document.getElementById('reportContent');
  if(!el) return;
  el.innerHTML = `
    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi-card blue"><div class="kpi-label">점검 매장</div><div class="kpi-value blue">${inspectedIds.length}</div><div class="kpi-sub">/ ${stores.length}개</div></div>
      <div class="kpi-card green"><div class="kpi-label">월 평균</div><div class="kpi-value green">${avg}%</div><div class="kpi-sub">${insp.length}회</div></div>
      <div class="kpi-card orange"><div class="kpi-label">평균 미흡</div><div class="kpi-value orange">${avgFail}</div><div class="kpi-sub">건/회</div></div>
      <div class="kpi-card red"><div class="kpi-label">미점검</div><div class="kpi-value red">${stores.length-inspectedIds.length}</div><div class="kpi-sub">미완료</div></div>
    </div>
    <div class="panel-row cols2">
      <div class="panel">
        <div class="panel-header"><div class="panel-title">브랜드별 현황</div></div>
        <div class="panel-body">
          ${Object.entries(brandMap).map(([bn,scores])=>{
            const bavg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
            const cls = bavg>=80?'good':bavg>=60?'mid':'low';
            return `<div style="margin-bottom:10px">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:13px;font-weight:700">${bn}</span>
                <span style="font-size:12px;color:var(--text-muted)">${bavg}% · ${scores.length}회</span>
              </div>
              <div class="brand-bar-track"><div class="brand-bar-fill ${cls}" style="width:${bavg}%"></div></div>
            </div>`;
          }).join('')||'<div class="empty-state" style="padding:20px">데이터 없음</div>'}
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">이달의 매장</div></div>
        <div class="panel-body">
          ${topStore ? `
            <div style="margin-bottom:16px">
              <div style="font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--good);margin-bottom:5px">🏆 최고점</div>
              <div style="font-size:16px;font-weight:800">${topStore.stores?.name||'-'}</div>
              <div style="font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--good)">${Math.round(topStore.score||0)}%</div>
            </div>
            <div>
              <div style="font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--poor);margin-bottom:5px">⚠️ 최저점</div>
              <div style="font-size:16px;font-weight:800">${botStore?.stores?.name||'-'}</div>
              <div style="font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--poor)">${Math.round(botStore?.score||0)}%</div>
            </div>` : '<div class="empty-state" style="padding:20px">데이터 없음</div>'}
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">매장별 상세</div>
        <div class="panel-badge">${insp.length}건</div>
      </div>
      <div class="panel-body" style="padding:0">
        <table class="data-table">
          <thead><tr><th>매장</th><th>브랜드</th><th>점검일</th><th>점수</th><th>적합</th><th>미흡</th></tr></thead>
          <tbody>
            ${insp.sort((a,b)=>(b.score||0)-(a.score||0)).map(i=>`
              <tr class="clickable" onclick="openDetail('${i.id}')">
                <td style="font-weight:700">${i.stores?.name||'-'}</td>
                <td style="color:var(--text-dim)">${i.stores?.brands?.name||'-'}</td>
                <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim)">${i.inspected_at||'-'}</td>
                <td><span class="score-pill ${scorePillClass(i.score)}">${i.score?Math.round(i.score)+'%':'-'}</span></td>
                <td style="color:var(--good);font-family:'DM Mono',monospace;font-size:12px">${i.pass_count??'-'}</td>
                <td style="color:var(--poor);font-family:'DM Mono',monospace;font-size:12px">${i.fail_count??'-'}</td>
              </tr>`).join('')||'<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted)">이달 점검 없음</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
}

function downloadMonthlyReport() {
  const month = document.getElementById('reportMonth')?.value||'';
  const insp = (cache.inspections||[]).filter(i=>(i.inspected_at||'').startsWith(month));
  if(!insp.length){showToast('해당 월 점검 데이터가 없습니다','error');return;}
  const wb = XLSX.utils.book_new();
  const data = [['매장명','브랜드','점검일','점수(%)','적합','미흡','총평']];
  insp.forEach(i=>data.push([i.stores?.name||'',i.stores?.brands?.name||'',i.inspected_at||'',i.score?Math.round(i.score):'',i.pass_count??'',i.fail_count??'',i.comment||'']));
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:16},{wch:12},{wch:12},{wch:10},{wch:8},{wch:8},{wch:40}];
  XLSX.utils.book_append_sheet(wb,'월간리포트',ws);
  XLSX.writeFile(wb,`PANASIA_월간리포트_${month}.xlsx`);
  showToast('Excel 다운로드 완료','success');
}

      </select>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="histSearch" placeholder="매장명 검색..." oninput="filterHistory()">
      </div>
      <div style="margin-left:auto;font-size:12px;color:var(--text-muted)" id="histCount">${insp.length}건</div>
    </div>
    <div class="panel">
      <div class="panel-body" style="padding:0">
        <div id="histTableWrap">${renderHistTable(insp)}</div>
      </div>

  </div>`;

function filterHistory() {
  let insp = cache.inspections||[];
  const brand = document.getElementById('histBrandFilter')?.value;
  const store = document.getElementById('histStoreFilter')?.value;
  const month = document.getElementById('histMonthFilter')?.value;
  const score = document.getElementById('histScoreFilter')?.value;
  const search = document.getElementById('histSearch')?.value||'';
  if(brand) insp = insp.filter(i=>i.stores?.brands?.name===brand);
  if(store) insp = insp.filter(i=>i.store_id===store);
  if(month) insp = insp.filter(i=>(i.inspected_at||'').startsWith(month));
  if(score==='good') insp = insp.filter(i=>(i.score||0)>=80);
  if(score==='mid') insp = insp.filter(i=>(i.score||0)>=60&&(i.score||0)<80);
  if(score==='low') insp = insp.filter(i=>(i.score||0)<60);
  if(search) insp = insp.filter(i=>i.stores?.name?.includes(search));
  document.getElementById('histCount').textContent = `${insp.length}건`;
  document.getElementById('histTableWrap').innerHTML = renderHistTable(insp);
}

function renderHistTable(insp) {
  if(!insp.length) return '<div class="empty-state" style="padding:32px"><div class="empty-state-icon">📋</div><div class="empty-state-text">조건에 맞는 점검 이력이 없습니다</div></div>';
  return `<table class="data-table">
    <thead><tr><th>매장</th><th>브랜드</th><th>점검일</th><th>점수</th><th>적합</th><th>미흡</th><th>삭제</th></tr></thead>
    <tbody>${insp.map(i=>`
      <tr class="clickable" onclick="openDetail('${i.id}')">
        <td style="font-weight:700">${i.stores?.name||'-'}</td>
        <td style="color:var(--text-dim)">${i.stores?.brands?.name||'-'}</td>
        <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim)">${i.inspected_at||'-'}</td>
        <td><span class="score-pill ${scorePillClass(i.score)}">${i.score?Math.round(i.score)+'%':'미점검'}</span></td>
        <td style="color:var(--good);font-family:'DM Mono',monospace;font-size:12px">${i.pass_count??'-'}</td>
        <td style="color:var(--poor);font-family:'DM Mono',monospace;font-size:12px">${i.fail_count??'-'}</td>
        <td onclick="event.stopPropagation();confirmDeleteInsp('${i.id}','${i.stores?.name||''}')">
          <span class="btn sm danger" style="font-size:10px;padding:2px 8px">삭제</span>
        </td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// ══════════════════════════════════════════
// PAGE: INSPECTOR — 4차
// ══════════════════════════════════════════
function renderInspector(el) {
  const insp = cache.inspections||[];
  const inspMap = {};
  insp.forEach(i=>{
    const name = i.inspector_name||'미기재';
    if(!inspMap[name]) inspMap[name]={name,cnt:0,scores:[],stores:new Set(),brands:new Set()};
    inspMap[name].cnt++;
    if(i.score) inspMap[name].scores.push(i.score);
    if(i.store_id) inspMap[name].stores.add(i.store_id);
    if(i.stores?.brands?.name) inspMap[name].brands.add(i.stores.brands.name);
  });

  const list = Object.values(inspMap).sort((a,b)=>b.cnt-a.cnt);
  const emojis = ['👨‍💼','👩‍💼','🧑‍💼','👤','🙋'];

  el.innerHTML = `<div class="fade-in">
    <div style="padding:12px 16px;background:var(--blue-bg);border:1px solid rgba(37,99,235,.2);border-radius:10px;font-size:13px;color:#1e40af;margin-bottom:16px">
      💡 점검자 통계는 모바일 앱에서 <strong>inspector_name</strong> 필드 저장 시 자동 집계됩니다.
    </div>
    <div class="inspector-grid">
      ${list.map((r,idx)=>{
        const avg = r.scores.length ? Math.round(r.scores.reduce((a,b)=>a+b,0)/r.scores.length) : 0;
        const max = r.scores.length ? Math.round(Math.max(...r.scores)) : 0;
        const min = r.scores.length ? Math.round(Math.min(...r.scores)) : 0;
        return `<div class="inspector-card">
          <div class="inspector-avatar">${emojis[idx%emojis.length]}</div>
          <div class="inspector-name">${r.name}</div>
          <div class="inspector-cnt">${r.cnt}</div>
          <div class="inspector-sub">회 점검 완료</div>
          <div style="margin-top:8px;font-size:11px;color:var(--text-dim)">담당 매장 ${r.stores.size}개</div>
          ${avg ? `<div style="margin-top:6px;display:flex;gap:5px;justify-content:center">
            <span class="score-pill ${scorePillClass(avg)}" style="font-size:10px">평균 ${avg}%</span>
          </div>
          <div style="margin-top:4px;font-size:10px;color:var(--text-muted)">최고 ${max}% / 최저 ${min}%</div>` : ''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ══════════════════════════════════════════
// PAGE: SCHEDULE — 4차
// ══════════════════════════════════════════
function renderSchedule(el) {
  const stores = cache.stores||[];
  const latestMap = getLatestInspByStore();
  const now = new Date();

  const schedules = stores.map(s=>{
    const latest = latestMap[s.id];
    const daysSince = latest ? Math.floor((now-new Date(latest.inspected_at))/86400000) : 999;
    const nextDate = latest ? new Date(new Date(latest.inspected_at).getTime()+30*86400000) : null;
    const daysUntil = nextDate ? Math.floor((nextDate-now)/86400000) : null;
    let status='ok', statusTxt='정상';
    if(!latest){status='overdue';statusTxt='미점검';}
    else if(daysUntil<0){status='overdue';statusTxt=`${Math.abs(daysUntil)}일 초과`;}
    else if(daysUntil<=7){status='soon';statusTxt=`D-${daysUntil}`;}
    return {s,latest,daysSince,nextDate,daysUntil,status,statusTxt};
  }).sort((a,b)=>{
    const order={overdue:0,soon:1,ok:2};
    return (order[a.status]||2)-(order[b.status]||2);
  });

  const overdueCnt = schedules.filter(s=>s.status==='overdue').length;
  const soonCnt = schedules.filter(s=>s.status==='soon').length;
  const okCnt = stores.length - overdueCnt - soonCnt;

  el.innerHTML = `<div class="fade-in">
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:18px">
      <div class="kpi-card red"><div class="kpi-label">점검 필요</div><div class="kpi-value red">${overdueCnt}</div><div class="kpi-sub">미점검 또는 초과</div></div>
      <div class="kpi-card orange"><div class="kpi-label">7일 내 예정</div><div class="kpi-value orange">${soonCnt}</div><div class="kpi-sub">곧 점검 필요</div></div>
      <div class="kpi-card green"><div class="kpi-label">정상</div><div class="kpi-value green">${okCnt}</div><div class="kpi-sub">30일 이내 완료</div></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">매장별 점검 스케줄 (30일 주기 기준)</div>
        <button class="btn sm" onclick="exportScheduleExcel()">📊 Excel</button>
      </div>
      <div class="panel-body" style="padding:0">
        ${schedules.map(sc=>`
          <div class="schedule-row" onclick="openDetailByStore('${sc.s.id}')" style="cursor:pointer">
            <div>
              <div class="schedule-store">${sc.s.name}</div>
              <div style="font-size:11px;color:var(--text-muted)">${sc.s.brands?.name||'-'} · ${sc.s.region||'-'}</div>
            </div>
            <div>
              <div class="schedule-date">최근: ${sc.latest?sc.latest.inspected_at:'미점검'}</div>
              <div class="schedule-date">예정: ${sc.nextDate?sc.nextDate.toISOString().slice(0,10):'-'}</div>
            </div>
            <div style="text-align:right">
              <span class="schedule-status ${sc.status}">${sc.statusTxt}</span>
              ${sc.latest?`<div style="font-size:11px;color:var(--text-muted);margin-top:3px">${sc.daysSince}일 경과</div>`:''}
            </div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function exportScheduleExcel() {
  const stores = cache.stores||[];
  const latestMap = getLatestInspByStore();
  const now = new Date();
  const wb = XLSX.utils.book_new();
  const data = [['매장명','브랜드','지역','최근점검일','다음예정일','상태']];
  stores.forEach(s=>{
    const l = latestMap[s.id];
    const next = l ? new Date(new Date(l.inspected_at).getTime()+30*86400000).toISOString().slice(0,10) : '-';
    const days = l ? Math.floor((now-new Date(l.inspected_at))/86400000) : 999;
    let status = !l?'미점검':days>30?`${days-30}일초과`:days>23?'주의':'정상';
    data.push([s.name,s.brands?.name||'',s.region||'',l?.inspected_at||'미점검',next,status]);
  });
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:14},{wch:12},{wch:10},{wch:14},{wch:14},{wch:10}];
  XLSX.utils.book_append_sheet(wb,'점검스케줄',ws);
  XLSX.writeFile(wb,`PANASIA_점검스케줄_${now.toISOString().slice(0,10)}.xlsx`);
  showToast('스케줄 Excel 다운로드 완료','success');
}

// DETAIL MODAL — 2차: 이전 점검 비교
// ══════════════════════════════════════════
async function openDetail(inspectionId) {
  if(!inspectionId) return;
  document.getElementById('detailModal').classList.remove('hidden');
  document.getElementById('dCompare').classList.add('hidden');
  document.getElementById('dBody').innerHTML =
    '<div class="loading-spinner"><div class="spinner"></div><div>불러오는 중...</div></div>';
  document.getElementById('dToolbar').style.display = 'none';
  document.getElementById('actionPanelWrap').style.display = 'none';

  try {
    const [inspArr, itemsArr] = await Promise.all([
      sb.get('inspections',`?id=eq.${inspectionId}&select=*,stores(id,name,region,brands(name))`),
      sb.get('inspection_items',`?inspection_id=eq.${inspectionId}&select=*,checklist_items(title,criteria,item_number,checklist_categories(section,name_ko))&order=created_at.asc`)
    ]);
    const insp = inspArr[0];
    if(!insp) {
      document.getElementById('dBody').innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">데이터 없음</div></div>';
      return;
    }

    document.getElementById('dStoreName').textContent = `${insp.stores?.brands?.name||''} ${insp.stores?.name||''}`.trim();
    document.getElementById('dMeta').innerHTML = `
      <span class="modal-meta-tag">📅 ${insp.inspected_at}</span>
      <span class="modal-meta-tag">📍 ${insp.stores?.region||'-'}</span>
      ${insp.submitted_at?`<span class="modal-meta-tag">🕐 ${new Date(insp.submitted_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</span>`:''}
    `;

    const score = insp.score ? Math.round(insp.score) : 0;
    const scoreColor = score>=80?'var(--good)':score>=60?'var(--warn)':'var(--poor)';
    document.getElementById('dKpi').innerHTML = `
      <div class="modal-kpi-item"><div class="modal-kpi-label">최종 점수</div><div class="modal-kpi-value" style="color:${scoreColor}">${score}%</div></div>
      <div class="modal-kpi-item"><div class="modal-kpi-label">우수/적합</div><div class="modal-kpi-value" style="color:var(--good)">${insp.pass_count??0}</div></div>
      <div class="modal-kpi-item"><div class="modal-kpi-label">미흡/부적합</div><div class="modal-kpi-value" style="color:var(--poor)">${insp.fail_count??0}</div></div>
      <div class="modal-kpi-item"><div class="modal-kpi-label">전체 항목</div><div class="modal-kpi-value">${insp.total_items??0}</div></div>
    `;

    // 2차: 이전 점검 비교
    const storeAll = (cache.inspections||[]).filter(i=>i.store_id===insp.store_id)
      .sort((a,b)=>b.inspected_at.localeCompare(a.inspected_at));
    const prevInsp = storeAll.find(i=>i.id!==inspectionId);
    if(prevInsp?.score) {
      const diff = Math.round((insp.score||0)-(prevInsp.score||0));
      const cls = diff>0?'up':diff<0?'down':'same';
      const icon = diff>0?'▲':diff<0?'▼':'─';
      const compareEl = document.getElementById('dCompare');
      compareEl.classList.remove('hidden');
      compareEl.innerHTML = `
        <span style="color:var(--text-muted)">직전 점검 (${prevInsp.inspected_at}) 대비:</span>
        <span class="compare-tag ${cls}">${icon} ${Math.abs(diff)}% ${diff>0?'상승':diff<0?'하락':'동일'}</span>
        <span style="color:var(--text-muted)">이전: <strong>${Math.round(prevInsp.score)}%</strong></span>
      `;
    }

    // 항목 렌더
    const failItems = itemsArr.filter(i=>['fail','poor'].includes(i.result));
    const passItems = itemsArr.filter(i=>['pass','good'].includes(i.result));
    let bodyHtml = '';

    if(failItems.length>0) {
      bodyHtml += `<div class="modal-section-title">⚠️ 미흡/부적합 (${failItems.length}건)</div>
      <div class="modal-item-list">
        ${failItems.map(item=>{
          const cls = item.requires_action?'warn':'fail';
          const cat = item.checklist_items?.checklist_categories;
          return `<div class="modal-item ${cls}">
            <div class="modal-item-num">${item.checklist_items?.item_number||'-'}</div>
            <div class="modal-item-content">
              <div class="modal-item-cat">${cat?.name_ko||cat?.section||'-'}</div>
              <div class="modal-item-title">${item.checklist_items?.title||item.note||'(항목 정보 없음)'}</div>
              ${item.note?`<div class="modal-item-note">📝 ${item.note}</div>`:''}
              ${item.requires_action?'<span class="tag action" style="margin-top:5px">🚨 즉시조치 필요</span>':''}
            </div>
            <span class="modal-item-badge ${cls}">${item.requires_action?'즉시조치':'미흡'}</span>
          </div>`;
        }).join('')}
      </div>`;
    }

    if(passItems.length>0) {
      bodyHtml += `<div class="modal-section-title">✅ 우수/적합 (${passItems.length}건)</div>
      <div class="modal-item-list" id="passItemList">
        ${passItems.map((item,idx)=>{
          const cat = item.checklist_items?.checklist_categories;
          return `<div class="modal-item pass" id="pass-item-${idx}" style="${idx>=5?'display:none':''}">
            <div class="modal-item-num">${item.checklist_items?.item_number||(idx+1)}</div>
            <div class="modal-item-content">
              <div class="modal-item-cat">${cat?.name_ko||'-'}</div>
              <div class="modal-item-title">${item.checklist_items?.title||item.note||'(항목 정보 없음)'}</div>
            </div>
            <span class="modal-item-badge pass">적합</span>
          </div>`;
        }).join('')}
      </div>
      ${passItems.length>5?`<button class="toggle-expand-btn" id="passToggleBtn" onclick="togglePassItems(${passItems.length})">▼ 나머지 ${passItems.length-5}개 더 보기</button>`:''}`;
    }

    if(insp.comment) bodyHtml += `<div class="modal-section-title">💬 총평</div><div class="modal-comment">${insp.comment}</div>`;
    if(!bodyHtml) bodyHtml = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">항목별 상세 데이터가 없습니다.<br>점검 앱에서 제출된 항목 데이터를 확인하세요.</div></div>';

    document.getElementById('dBody').innerHTML = bodyHtml;
    document.getElementById('dToolbar').style.display = 'flex';
    window._currentInsp = insp;
    window._currentItems = itemsArr;
    loadActionLogs(inspectionId);
  } catch(e) {
    document.getElementById('dBody').innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">불러오기 실패: ${e.message}</div></div>`;
  }
}

async function openDetailByStore(storeId) {
  const insp = (cache.inspections||[]).find(i=>i.store_id===storeId);
  if(insp) openDetail(insp.id);
  else showToast('아직 점검 데이터가 없습니다','error');
}

function closeDetail() {
  document.getElementById('detailModal').classList.add('hidden');
  document.getElementById('dToolbar').style.display = 'none';
  document.getElementById('actionPanelWrap').style.display = 'none';
  window._currentInsp = null;
  window._currentItems = null;
}

function closeDetailOnBg(e) { if(e.target===document.getElementById('detailModal')) closeDetail(); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDetail(); });

function togglePassItems(total) {
  const btn = document.getElementById('passToggleBtn');
  const expanded = btn.dataset.expanded==='true';
  for(let i=5;i<total;i++){const el=document.getElementById(`pass-item-${i}`);if(el)el.style.display=expanded?'none':'flex';}
  btn.dataset.expanded = expanded?'false':'true';
  btn.textContent = expanded?`▼ 나머지 ${total-5}개 더 보기`:'▲ 접기';
}

// 후조치
// ══════════════════════════════════════════
function toggleActionPanel(){
  const w = document.getElementById('actionPanelWrap');
  w.style.display = w.style.display==='none'?'block':'none';
}

async function loadActionLogs(inspectionId) {
  try {
    const logs = await sb.get('action_logs',`?store_id=in.(select store_id from inspections where id=eq.${inspectionId})&order=created_at.desc&limit=10`);
    renderActionLogs(logs);
  } catch(e){ renderActionLogs([]); }
}

function renderActionLogs(logs) {
  const el = document.getElementById('actionLogList');
  if(!el) return;
  if(!logs||!logs.length){
    el.innerHTML = '<div style="text-align:center;padding:12px;color:var(--text-muted);font-size:13px">등록된 후조치 없음</div>';
    return;
  }
  el.innerHTML = logs.map(log=>`
    <div class="action-log-item">
      <div class="action-log-meta">${log.actioned_by||'담당자'} · ${new Date(log.actioned_at||log.created_at).toLocaleString('ko-KR')}</div>
      <div class="action-log-text">${log.action_note||''}</div>
    </div>`).join('');
}

async function submitAction() {
  const text = document.getElementById('actionText').value.trim();
  if(!text){showToast('조치 내용을 입력하세요','error');return;}
  const insp = window._currentInsp;
  if(!insp) return;
  const btn = document.getElementById('actionSubmitBtn');
  btn.textContent='저장 중...'; btn.disabled=true;
  try {
    const items = window._currentItems||[];
    const actionItem = items.find(i=>i.requires_action)||items[0];
    await sb.post('action_logs',[{inspection_item_id:actionItem?.id||null,store_id:insp.store_id,action_note:text,actioned_by:'본사',actioned_at:new Date().toISOString()}]);
    document.getElementById('actionText').value = '';
    btn.textContent='✅ 저장 완료!';
    setTimeout(()=>{btn.textContent='조치 내용 저장';btn.disabled=false;},1500);
    await loadActionLogs(insp.id);
    showToast('후조치 등록 완료','success');
  } catch(e){
    btn.textContent='저장 실패'; btn.disabled=false;
    showToast('저장 실패: '+e.message,'error');
  }
}
